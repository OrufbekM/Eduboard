{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edu Board - Login</title>
    <link rel="stylesheet" href="{% static 'css/index.css' %}">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <style>
        body {
            background-image: url("{% static 'images/bac.png' %}");
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
        }
        @font-face {
            font-family: 'metropolis';
            src: url("{% static 'css/fonts/Metropolis-Medium.otf' %}") format('truetype'); 
            font-weight: normal;
            font-style: normal;
        }
    </style>
</head>
<body>
    <main>
        <h2>Welcome to</h2>
        <h1>Edu Board</h1>
        <h4>your online companion for teaching</h4>
    </main>
    
    <footer>
        <div class="loginform">
            
            <form action="{% url 'login' %}" method="POST">
                {% csrf_token %}
                
                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit" class="loginbtn">Log in</button>
            </form>
        </div>
    </footer>

    <script src="{% static 'js/root.js' %}"></script>
</body>
</html>
